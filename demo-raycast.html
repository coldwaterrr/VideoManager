<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoManager - Raycast 风格预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0f;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶部标题栏 - Raycast 暗铬渐变 */
    .titlebar {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: linear-gradient(180deg, #1c1c1e 0%, #141416 100%);
      border-bottom: 1px solid #2a2a2e;
      -webkit-app-region: drag;
      user-select: none;
    }

    .titlebar-title {
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
      flex: 1;
      text-align: center;
    }

    .titlebar-dots {
      display: flex;
      gap: 8px;
    }

    .titlebar-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2a2a2e;
    }

    .titlebar-dots span:hover {
      background: #3a3a3e;
    }

    /* 主布局 */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 侧边栏 - 暗铬面板 */
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #161618 0%, #121214 100%);
      border-right: 1px solid #2a2a2e;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #52525b;
      padding: 0 8px 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: #a1a1aa;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .sidebar-item:hover {
      background: #1e1e20;
      color: #e4e4e7;
    }

    .sidebar-item.active {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    .sidebar-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 内容区域 */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .toolbar-title {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #1e1e20;
      color: #a1a1aa;
      border: 1px solid #2a2a2e;
    }

    .btn-secondary:hover {
      background: #2a2a2e;
      color: #e4e4e7;
    }

    /* 视频卡片网格 */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .video-card {
      background: linear-gradient(180deg, #1a1a1c 0%, #161618 100%);
      border: 1px solid #2a2a2e;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .video-card:hover {
      border-color: #3a3a3e;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .video-card:hover .video-cover {
      opacity: 0.8;
    }

    .video-cover {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #2a2a2e 0%, #1e1e20 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .video-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
    }

    .play-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
      z-index: 1;
    }

    .play-icon::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 12px solid #fff;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      margin-left: 3px;
    }

    .video-info {
      padding: 12px;
    }

    .video-title {
      font-size: 13px;
      font-weight: 500;
      color: #e4e4e7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .video-meta {
      font-size: 11px;
      color: #52525b;
      display: flex;
      gap: 8px;
    }

    .video-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 评分徽章 */
    .rating-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      background: rgba(99, 102, 241, 0.15);
      border-radius: 4px;
      font-size: 11px;
      color: #a78bfa;
    }

    /* 播放器区域预览 */
    .player-preview {
      margin-top: 32px;
      padding: 20px;
      background: linear-gradient(180deg, #1a1a1c 0%, #141416 100%);
      border: 1px solid #2a2a2e;
      border-radius: 12px;
    }

    .player-preview-title {
      font-size: 12px;
      font-weight: 600;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .player-screen {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .player-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
    }

    .player-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: #2a2a2e;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 2px;
    }

    .player-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .player-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .time-text {
      font-size: 11px;
      color: #71717a;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

  <!-- 标题栏 -->

    <div class="titlebar-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

  <!-- 主布局 -->

        <div class="video-card">

        <div class="video-card">

          </div>
        </div>

        <div class="video-card">
          <div class="video-cover">
            <div class="play-icon"></div>
          </div>
          <div class="video-info">

        <div class="video-card">

      </div>

      <!-- 播放器预览 -->

        <div class="player-screen">

      </div>

    </div>
  </div>

</body>
</html>
